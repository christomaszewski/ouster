name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  ROS_DISTRO: lyrical

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  # ---------------------------------------------------------------------------
  # Build the runtime image — the gate that proves the pinned upstream
  # (ouster.repos) still fetches via `vcs import` and compiles. This is what
  # catches an upstream version bump that breaks the build. No push: `rig build`
  # (tools/build_image.sh) publishes; CI only validates the build.
  # ---------------------------------------------------------------------------
  build-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.runtime
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ROS_DISTRO=${{ env.ROS_DISTRO }}

  # ---------------------------------------------------------------------------
  # rig launcher contract, executable (see rigging.yaml). `rig certify` runs
  # `ouster-up <config> config` under a poisoned fleet env and asserts the
  # contract held: COMPOSE_PROJECT_NAME honored (no -p), image pulled from
  # RIG_IMAGE_REGISTRY as :RIG_IMAGE_TAG (build/pull agreement), fleet ROS env
  # passed through, deterministic + name-derived output, external-volume match.
  # Bare runner — needs docker compose + PyYAML, not ROS.
  # ---------------------------------------------------------------------------
  certify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: christomaszewski/rig
          path: .rig
      - run: python3 -m pip install --user pyyaml
      - name: rig certify (launcher contract)
        run: ./.rig/rig certify --repo . --config sensors/ouster.example.yaml

  # ---------------------------------------------------------------------------
  # Shell hygiene on the deploy surface (launcher + build script + entrypoints).
  # ---------------------------------------------------------------------------
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck launcher + build script + entrypoints
        run: shellcheck ouster-up tools/build_image.sh docker/entrypoints/*.sh
